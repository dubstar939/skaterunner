<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
    <meta name="description" content="Third Coast Shread - An awesome skateboarding game by 939PRO Studios. Jump, perform tricks, and avoid obstacles!" />
    <meta name="theme-color" content="#1a1a2e" />
    <title>Third Coast Shread by 939PRO Studios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            touch-action: none;
        }
        .game-wrapper {
            background: #16213e;
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(255, 200, 50, 0.1);
            border: 2px solid #ffcc3344;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            max-width: 900px;
            max-height: 520px;
            border-radius: 12px;
            cursor: pointer;
            touch-action: none;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.2);
        }
        .controls-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            color: #ffcc33;
            font-size: 13px;
            padding: 0 8px;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }
        .controls-info span {
            background: rgba(255, 204, 51, 0.12);
            padding: 4px 14px;
            border-radius: 20px;
            border: 1px solid #ffcc3344;
        }
        @media (max-width: 600px) {
            .game-wrapper { padding: 6px; border-radius: 12px; }
            .controls-info { font-size: 10px; flex-wrap: wrap; gap: 4px; }
            .controls-info span { padding: 3px 10px; }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="900" height="520"></canvas>
        <div class="controls-info">
            <span>🛹 SPACE / TAP = Jump</span>
            <span>⬇️ DOWN / SWIPE = Trick</span>
            <span>⭐ Tricks = Bonus!</span>
        </div>
    </div>
    
    <script>
    (function() {
        "use strict";

        // ============================================
        // SPRITE GENERATOR - Manually drawn pixel art
        // ============================================
        
        const CHARACTER_COLORS = {
            hair: '#4CAF50',
            hairShadow: '#2E7D32',
            sunglasses: '#FF9800',
            sunglassesFrame: '#FFB74D',
            skin: '#FFCC80',
            skinShadow: '#F5A962',
            jacket: '#9C27B0',
            jacketShadow: '#7B1FA2',
            pants: '#2196F3',
            pantsShadow: '#1976D2',
            shoes: '#FFFFFF',
            shoesShadow: '#E0E0E0',
            skateboard: '#FF5722',
            skateboardGrip: '#424242',
            skateboardWheels: '#FFEB3B'
        };

        function createSpriteSheet() {
            const frameWidth = 64;
            const frameHeight = 64;
            const cols = 16;
            const rows = 8;
            
            const canvas = document.createElement('canvas');
            canvas.width = frameWidth * cols;
            canvas.height = frameHeight * rows;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            
            // Row 0: Idle (4 frames) + Run (8 frames)
            for (let i = 0; i < 4; i++) drawIdle(ctx, i, frameWidth, frameHeight, i * frameWidth);
            for (let i = 0; i < 8; i++) drawRun(ctx, i, frameWidth, frameHeight, (4 + i) * frameWidth);
            
            // Row 1: Skate animations
            for (let i = 0; i < 4; i++) drawSkateIdle(ctx, i, frameWidth, frameHeight, i * frameWidth, frameHeight);
            for (let i = 0; i < 6; i++) drawSkatePush(ctx, i, frameWidth, frameHeight, (4 + i) * frameWidth, frameHeight);
            for (let i = 0; i < 4; i++) drawSkateCruise(ctx, i, frameWidth, frameHeight, (10 + i) * frameWidth, frameHeight);
            
            // Row 2: Jump animations
            for (let i = 0; i < 4; i++) drawJumpStart(ctx, i, frameWidth, frameHeight, i * frameWidth, frameHeight * 2);
            for (let i = 0; i < 4; i++) drawJumpMid(ctx, i, frameWidth, frameHeight, (4 + i) * frameWidth, frameHeight * 2);
            for (let i = 0; i < 4; i++) drawJumpDouble(ctx, i, frameWidth, frameHeight, (8 + i) * frameWidth, frameHeight * 2);
            for (let i = 0; i < 4; i++) drawJumpLand(ctx, i, frameWidth, frameHeight, (12 + i) * frameWidth, frameHeight * 2);
            
            // Row 3: Tricks
            for (let i = 0; i < 6; i++) drawKickflip(ctx, i, frameWidth, frameHeight, i * frameWidth, frameHeight * 3);
            for (let i = 0; i < 5; i++) drawOllie(ctx, i, frameWidth, frameHeight, (6 + i) * frameWidth, frameHeight * 3);
            for (let i = 0; i < 4; i++) drawManual(ctx, i, frameWidth, frameHeight, (11 + i) * frameWidth, frameHeight * 3);
            
            // Row 4: More tricks
            for (let i = 0; i < 6; i++) drawAirGrab(ctx, i, frameWidth, frameHeight, i * frameWidth, frameHeight * 4);
            for (let i = 0; i < 8; i++) drawSpin360(ctx, i, frameWidth, frameHeight, (6 + i) * frameWidth, frameHeight * 4);
            
            // Row 5: Wipeout
            for (let i = 0; i < 4; i++) drawWipeoutTrip(ctx, i, frameWidth, frameHeight, i * frameWidth, frameHeight * 5);
            for (let i = 0; i < 6; i++) drawWipeoutRoll(ctx, i, frameWidth, frameHeight, (4 + i) * frameWidth, frameHeight * 5);
            for (let i = 0; i < 4; i++) drawWipeoutSlide(ctx, i, frameWidth, frameHeight, (10 + i) * frameWidth, frameHeight * 5);
            
            // Row 6: Recovery + extra
            for (let i = 0; i < 6; i++) drawWipeoutRecover(ctx, i, frameWidth, frameHeight, i * frameWidth, frameHeight * 6);
            
            return canvas.toDataURL('image/png');
        }

        function putPixel(ctx, x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(Math.floor(x), Math.floor(y), 1, 1);
        }

        function drawCharacter(ctx, baseX, baseY, frameProgress, animType, onSkateboard = false) {
            const c = CHARACTER_COLORS;
            
            const legOffset = Math.sin(frameProgress * 0.5) * 3;
            const armOffset = Math.cos(frameProgress * 0.5) * 2;
            const bobOffset = Math.abs(Math.sin(frameProgress * 0.5)) * 1;
            
            const startX = baseX + 16;
            const startY = baseY + 48;
            
            // Draw skateboard if applicable
            if (onSkateboard) {
                ctx.fillStyle = c.skateboard;
                ctx.fillRect(startX - 20, startY + 8, 44, 6);
                ctx.fillStyle = c.skateboardGrip;
                ctx.fillRect(startX - 18, startY + 8, 40, 2);
                ctx.fillStyle = c.skateboardWheels;
                ctx.fillRect(startX - 16, startY + 14, 6, 6);
                ctx.fillRect(startX + 14, startY + 14, 6, 6);
            }
            
            // Back leg
            ctx.fillStyle = c.pants;
            ctx.fillRect(startX - 4 + legOffset, startY - 12, 6, 14);
            ctx.fillStyle = c.pantsShadow;
            ctx.fillRect(startX - 2 + legOffset, startY - 12, 3, 14);
            
            ctx.fillStyle = c.shoes;
            ctx.fillRect(startX - 6 + legOffset, startY + 2, 10, 6);
            ctx.fillStyle = c.shoesShadow;
            ctx.fillRect(startX - 6 + legOffset, startY + 5, 10, 3);
            
            // Front leg
            ctx.fillStyle = c.pants;
            ctx.fillRect(startX + 6 - legOffset, startY - 12, 6, 14);
            ctx.fillStyle = c.pantsShadow;
            ctx.fillRect(startX + 8 - legOffset, startY - 12, 3, 14);
            
            ctx.fillStyle = c.shoes;
            ctx.fillRect(startX + 4 - legOffset, startY + 2, 10, 6);
            ctx.fillStyle = c.shoesShadow;
            ctx.fillRect(startX + 4 - legOffset, startY + 5, 10, 3);
            
            // Body/Jacket
            ctx.fillStyle = c.jacket;
            ctx.fillRect(startX - 8, startY - 28, 18, 20);
            ctx.fillStyle = c.jacketShadow;
            ctx.fillRect(startX - 8, startY - 28, 6, 20);
            
            ctx.fillStyle = '#BA68C8';
            ctx.fillRect(startX - 6, startY - 24, 3, 3);
            ctx.fillRect(startX - 2, startY - 24, 3, 3);
            
            // Back arm
            ctx.fillStyle = c.jacket;
            ctx.fillRect(startX - 14 - armOffset, startY - 26, 8, 6);
            ctx.fillStyle = c.jacketShadow;
            ctx.fillRect(startX - 14 - armOffset, startY - 26, 4, 6);
            
            ctx.fillStyle = c.skin;
            ctx.fillRect(startX - 16 - armOffset, startY - 22, 5, 5);
            
            // Front arm
            ctx.fillStyle = c.jacket;
            ctx.fillRect(startX + 8 + armOffset, startY - 26, 8, 6);
            ctx.fillStyle = c.jacketShadow;
            ctx.fillRect(startX + 12 + armOffset, startY - 26, 4, 6);
            
            ctx.fillStyle = c.skin;
            ctx.fillRect(startX + 12 + armOffset, startY - 22, 5, 5);
            
            // Neck
            ctx.fillStyle = c.skin;
            ctx.fillRect(startX - 3, startY - 32, 8, 6);
            
            // Head
            ctx.fillStyle = c.skin;
            ctx.fillRect(startX - 10, startY - 44, 22, 16);
            ctx.fillStyle = c.skinShadow;
            ctx.fillRect(startX + 4, startY - 44, 8, 16);
            
            // Hair (spiky bright green)
            ctx.fillStyle = c.hair;
            ctx.fillRect(startX - 12, startY - 52, 26, 10);
            ctx.fillRect(startX - 10, startY - 58, 22, 8);
            ctx.fillRect(startX - 8, startY - 62, 4, 6);
            ctx.fillRect(startX - 2, startY - 64, 4, 8);
            ctx.fillRect(startX + 4, startY - 62, 4, 6);
            ctx.fillRect(startX + 10, startY - 58, 4, 5);
            ctx.fillRect(startX - 14, startY - 56, 4, 6);
            
            ctx.fillStyle = c.hairShadow;
            ctx.fillRect(startX - 8, startY - 50, 20, 4);
            ctx.fillRect(startX - 6, startY - 46, 16, 3);
            
            // Sunglasses (orange)
            ctx.fillStyle = c.sunglasses;
            ctx.fillRect(startX - 8, startY - 40, 18, 6);
            ctx.fillStyle = c.sunglassesFrame;
            ctx.fillRect(startX - 8, startY - 42, 18, 2);
            ctx.fillRect(startX + 8, startY - 40, 4, 6);
            ctx.fillRect(startX - 10, startY - 40, 2, 6);
            
            ctx.fillStyle = '#FFE082';
            ctx.fillRect(startX - 6, startY - 39, 6, 3);
            ctx.fillRect(startX + 2, startY - 39, 6, 3);
        }

        function drawIdle(ctx, frame, fw, fh, offsetX) {
            const baseY = fh - 16;
            drawCharacter(ctx, offsetX, baseY, frame * 0.5, 'idle', false);
        }

        function drawRun(ctx, frame, fw, fh, offsetX) {
            const baseY = fh - 16;
            drawCharacter(ctx, offsetX, baseY, frame * 1.2, 'run', false);
        }

        function drawSkateIdle(ctx, frame, fw, fh, offsetX) {
            const baseY = fh - 16;
            drawCharacter(ctx, offsetX, baseY, frame * 0.3, 'skateIdle', true);
        }

        function drawSkatePush(ctx, frame, fw, fh, offsetX) {
            const baseY = fh - 16;
            const pushOffset = Math.sin(frame * 0.8) * 8;
            drawCharacter(ctx, offsetX, baseY + pushOffset, frame * 0.8, 'skatePush', true);
        }

        function drawSkateCruise(ctx, frame, fw, fh, offsetX) {
            const baseY = fh - 16;
            drawCharacter(ctx, offsetX, baseY, frame * 0.4, 'skateCruise', true);
        }

        function drawJumpStart(ctx, frame, fw, fh, offsetX) {
            const baseY = fh - 16 - frame * 3;
            drawCharacter(ctx, offsetX, baseY, frame * 0.5, 'jumpStart', false);
        }

        function drawJumpMid(ctx, frame, fw, fh, offsetX) {
            const baseY = fh - 28 - Math.sin(frame * 0.5) * 4;
            drawCharacter(ctx, offsetX, baseY, frame * 0.6, 'jumpMid', false);
        }

        function drawJumpDouble(ctx, frame, fw, fh, offsetX) {
            const baseY = fh - 32 - Math.sin(frame * 0.7) * 6;
            drawCharacter(ctx, offsetX, baseY, frame * 0.8, 'jumpDouble', false);
        }

        function drawJumpLand(ctx, frame, fw, fh, offsetX) {
            const baseY = fh - 16 + Math.max(0, (3 - frame) * 2);
            drawCharacter(ctx, offsetX, baseY, frame * 0.4, 'jumpLand', false);
        }

        function drawKickflip(ctx, frame, fw, fh, offsetX) {
            const baseY = fh - 20;
            const rotation = frame * 0.8;
            ctx.save();
            ctx.translate(offsetX + 32, fh - 16);
            ctx.rotate(rotation);
            drawCharacter(ctx, -32, -16, frame * 0.5, 'kickflip', true);
            ctx.restore();
        }

        function drawOllie(ctx, frame, fw, fh, offsetX) {
            const baseY = fh - 24 - Math.abs(frame - 2) * 3;
            drawCharacter(ctx, offsetX, baseY, frame * 0.4, 'ollie', true);
        }

        function drawManual(ctx, frame, fw, fh, offsetX) {
            const baseY = fh - 16;
            const tilt = Math.sin(frame * 0.5) * 0.1;
            ctx.save();
            ctx.translate(offsetX + 32, fh - 16);
            ctx.rotate(tilt);
            drawCharacter(ctx, -32, -16, frame * 0.3, 'manual', true);
            ctx.restore();
        }

        function drawAirGrab(ctx, frame, fw, fh, offsetX) {
            const baseY = fh - 28 - Math.sin(frame * 0.4) * 4;
            drawCharacter(ctx, offsetX, baseY, frame * 0.6, 'airGrab', true);
        }

        function drawSpin360(ctx, frame, fw, fh, offsetX) {
            const baseY = fh - 24;
            const rotation = (frame / 8) * Math.PI * 2;
            ctx.save();
            ctx.translate(offsetX + 32, fh - 16);
            ctx.rotate(rotation);
            drawCharacter(ctx, -32, -16, frame * 0.5, 'spin360', true);
            ctx.restore();
        }

        function drawWipeoutTrip(ctx, frame, fw, fh, offsetX) {
            const baseY = fh - 16 - frame * 4;
            const rotation = frame * 0.3;
            ctx.save();
            ctx.translate(offsetX + 32, fh - 16);
            ctx.rotate(rotation);
            drawCharacter(ctx, -32, -16, frame * 0.3, 'wipeout', false);
            ctx.restore();
        }

        function drawWipeoutRoll(ctx, frame, fw, fh, offsetX) {
            const baseY = fh - 12;
            const rotation = frame * 0.5;
            ctx.save();
            ctx.translate(offsetX + 32, baseY);
            ctx.rotate(rotation);
            drawCharacter(ctx, -32, -16, frame * 0.4, 'wipeout', false);
            ctx.restore();
        }

        function drawWipeoutSlide(ctx, frame, fw, fh, offsetX) {
            const baseY = fh - 14;
            const slideOffset = frame * 3;
            ctx.save();
            ctx.translate(offsetX + 32 + slideOffset, baseY);
            ctx.rotate(0.3);
            drawCharacter(ctx, -32 - slideOffset, -16, frame * 0.2, 'wipeout', false);
            ctx.restore();
        }

        function drawWipeoutRecover(ctx, frame, fw, fh, offsetX) {
            const baseY = fh - 16 + Math.max(0, (5 - frame) * 2);
            drawCharacter(ctx, offsetX, baseY, frame * 0.3, 'recover', false);
        }

        // ============================================
        // GAME ENGINE
        // ============================================
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            const maxW = 900, maxH = 520;
            const ratio = maxW / maxH;
            let w = wrapper.clientWidth - 4;
            let h = w / ratio;
            const maxHAllowed = window.innerHeight * 0.78;
            if (h > maxHAllowed) { h = maxHAllowed; w = h * ratio; }
            if (w > maxW) { w = maxW; h = maxH; }
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const W = 900, H = 520;
        const GROUND_Y = 440;
        
        const PHYSICS = {
            gravity: 0.7,
            jumpForce: -14,
            doubleJumpForce: -11,
            maxSpeed: 12,
            accel: 0.15,
            decel: 0.08,
            friction: 0.96,
            coyoteTime: 8,
            jumpBuffer: 6
        };

        let gameState = 'start';
        let score = 0;
        let distance = 0;
        let highScore = parseInt(localStorage.getItem('skateHigh')) || 0;
        let level = 1;
        let speed = 5;
        let combo = 0;
        let tricksDone = 0;
        
        const LEVEL_CONFIG = {
            1: { targetDist: 600, label: 'The Park', bgColors: ['#87CEEB', '#98FB98', '#90EE90'], obsMinGap: 180, obsMaxGap: 300 },
            2: { targetDist: 1300, label: 'The City', bgColors: ['#1a1a2e', '#2d2d44', '#3d3d5c'], obsMinGap: 140, obsMaxGap: 240 },
            3: { targetDist: 2100, label: 'The Coast', bgColors: ['#FF6B6B', '#FFE66D', '#4ECDC4'], obsMinGap: 100, obsMaxGap: 200 }
        };

        let spriteImage = null;
        let currentAnimation = 'idle';
        let animationFrame = 0;
        let frameTimer = 0;
        let facingRight = true;

        const ANIMATIONS = {
            idle: { row: 0, col: 0, frames: 4, fps: 8 },
            run: { row: 0, col: 4, frames: 8, fps: 12 },
            skateIdle: { row: 1, col: 0, frames: 4, fps: 6 },
            skatePush: { row: 1, col: 4, frames: 6, fps: 10 },
            skateCruise: { row: 1, col: 10, frames: 4, fps: 8 },
            jumpStart: { row: 2, col: 0, frames: 4, fps: 12 },
            jumpMid: { row: 2, col: 4, frames: 4, fps: 8 },
            jumpDouble: { row: 2, col: 8, frames: 4, fps: 10 },
            jumpLand: { row: 2, col: 12, frames: 4, fps: 12 },
            kickflip: { row: 3, col: 0, frames: 6, fps: 15 },
            ollie: { row: 3, col: 6, frames: 5, fps: 12 },
            manual: { row: 3, col: 11, frames: 4, fps: 8 },
            airGrab: { row: 4, col: 0, frames: 6, fps: 12 },
            spin360: { row: 4, col: 6, frames: 8, fps: 15 },
            wipeoutTrip: { row: 5, col: 0, frames: 4, fps: 12 },
            wipeoutRoll: { row: 5, col: 4, frames: 6, fps: 10 },
            wipeoutSlide: { row: 5, col: 10, frames: 4, fps: 8 },
            wipeoutRecover: { row: 6, col: 0, frames: 6, fps: 8 }
        };

        const player = {
            x: 160,
            y: GROUND_Y,
            w: 48,
            h: 64,
            vx: 0,
            vy: 0,
            onGround: true,
            coyoteCounter: 0,
            jumpBufferCounter: 0,
            canDoubleJump: false,
            rotation: 0,
            trickActive: false,
            trickType: 0,
            trickTimer: 0,
            onSkateboard: true,
            isWipedOut: false,
            recoverTimer: 0
        };

        let obstacles = [];
        let particles = [];
        let trickTexts = [];
        let screenShake = 0;
        let scrollOffset = 0;
        
        let parallaxLayers = {
            background: [],
            midground: [],
            foreground: []
        };

        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                try { audioCtx = new(window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
            }
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            switch(type) {
                case 'jump':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(700, now + 0.12);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                    break;
                case 'trick':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(500, now);
                    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                    gain.gain.setValueAtTime(0.08, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                    break;
                case 'crash':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.exponentialRampToValueAtTime(40, now + 0.3);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;
                case 'collect':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, now);
                    osc.frequency.exponentialRampToValueAtTime(1600, now + 0.08);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                    osc.start(now);
                    osc.stop(now + 0.12);
                    break;
                case 'levelup':
                    [523, 659, 784, 1047].forEach((freq, i) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        o.type = 'sine';
                        o.frequency.setValueAtTime(freq, now + i * 0.1);
                        g.gain.setValueAtTime(0.1, now + i * 0.1);
                        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.2);
                        o.start(now + i * 0.1);
                        o.stop(now + i * 0.1 + 0.2);
                    });
                    break;
            }
        }

        function initParallaxLayers() {
            const levelCfg = LEVEL_CONFIG[level] || LEVEL_CONFIG[1];
            const colors = levelCfg.bgColors;
            
            parallaxLayers.background = [];
            for (let i = 0; i < 10; i++) {
                parallaxLayers.background.push({
                    x: i * 120,
                    y: 100 + Math.random() * 150,
                    w: 60 + Math.random() * 40,
                    h: 80 + Math.random() * 120,
                    color: colors[1]
                });
            }
            
            parallaxLayers.midground = [];
            for (let i = 0; i < 15; i++) {
                parallaxLayers.midground.push({
                    x: i * 80,
                    y: 200 + Math.random() * 100,
                    w: 40 + Math.random() * 30,
                    h: 50 + Math.random() * 80,
                    color: colors[2]
                });
            }
            
            parallaxLayers.foreground = [];
            for (let i = 0; i < 20; i++) {
                parallaxLayers.foreground.push({
                    x: i * 60,
                    y: GROUND_Y + 20,
                    w: 20 + Math.random() * 15,
                    h: 10 + Math.random() * 8,
                    color: '#333'
                });
            }
        }

        function loadSprite() {
            spriteImage = new Image();
            spriteImage.onload = function() {
                console.log('Custom sprite sheet loaded!');
            };
            spriteImage.src = createSpriteSheet();
        }

        function updateAnimation() {
            const anim = ANIMATIONS[currentAnimation];
            if (!anim) return;
            
            frameTimer++;
            const frameDelay = Math.floor(60 / anim.fps);
            
            if (frameTimer >= frameDelay) {
                frameTimer = 0;
                animationFrame = (animationFrame + 1) % anim.frames;
            }
        }

        function setAnimation(name) {
            if (currentAnimation !== name) {
                currentAnimation = name;
                animationFrame = 0;
                frameTimer = 0;
            }
        }

        function determineAnimation() {
            if (player.isWipedOut) {
                if (player.recoverTimer > 0) {
                    setAnimation('wipeoutRecover');
                } else if (Math.abs(player.vy) > 2) {
                    setAnimation('wipeoutRoll');
                } else {
                    setAnimation('wipeoutSlide');
                }
                return;
            }
            
            if (player.trickActive) {
                switch(player.trickType) {
                    case 1: setAnimation('kickflip'); break;
                    case 2: setAnimation('ollie'); break;
                    case 3: setAnimation('airGrab'); break;
                    case 4: setAnimation('spin360'); break;
                    default: setAnimation('manual');
                }
                return;
            }
            
            if (!player.onGround) {
                if (player.vy < -5) {
                    setAnimation('jumpStart');
                } else if (player.vy > 0) {
                    setAnimation('jumpLand');
                } else {
                    setAnimation('jumpMid');
                }
                return;
            }
            
            if (player.onSkateboard) {
                if (speed > 8) {
                    setAnimation('skateCruise');
                } else if (speed > 3) {
                    setAnimation('skatePush');
                } else {
                    setAnimation('skateIdle');
                }
            } else {
                if (Math.abs(speed) > 0.5) {
                    setAnimation('run');
                } else {
                    setAnimation('idle');
                }
            }
        }

        function drawSprite(x, y) {
            if (!spriteImage) return;
            
            const anim = ANIMATIONS[currentAnimation];
            if (!anim) return;
            
            const frameW = 64, frameH = 64;
            const sx = (anim.col + animationFrame) * frameW;
            const sy = anim.row * frameH;
            
            ctx.save();
            ctx.translate(x, y);
            if (!facingRight) ctx.scale(-1, 1);
            ctx.drawImage(spriteImage, sx, sy, frameW, frameH, -player.w/2, -player.h, player.w, player.h);
            ctx.restore();
        }

        function resetGame() {
            player.x = 160;
            player.y = GROUND_Y;
            player.vy = 0;
            player.vx = 0;
            player.onGround = true;
            player.coyoteCounter = 0;
            player.jumpBufferCounter = 0;
            player.canDoubleJump = false;
            player.rotation = 0;
            player.trickActive = false;
            player.trickType = 0;
            player.onSkateboard = true;
            player.isWipedOut = false;
            
            score = 0;
            distance = 0;
            level = 1;
            speed = 5;
            combo = 0;
            tricksDone = 0;
            obstacles = [];
            particles = [];
            trickTexts = [];
            
            initParallaxLayers();
        }

        function spawnObstacle() {
            const levelCfg = LEVEL_CONFIG[level] || LEVEL_CONFIG[1];
            const gap = levelCfg.obsMinGap + Math.random() * (levelCfg.obsMaxGap - levelCfg.obsMinGap);
            
            const types = ['cone', 'barrier', 'ramp', 'rail'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            obstacles.push({
                x: W + 100,
                y: GROUND_Y,
                w: type === 'ramp' ? 60 : 30,
                h: type === 'barrier' ? 50 : (type === 'ramp' ? 40 : 25),
                type: type,
                passed: false,
                collected: false
            });
        }

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 30 + Math.random() * 20,
                    color: color,
                    size: 2 + Math.random() * 3
                });
            }
        }

        function addTrickText(text, x, y, bonus) {
            trickTexts.push({
                text: text,
                bonus: bonus,
                x: x,
                y: y,
                life: 60,
                vy: -2
            });
        }

        let keys = {};
        let touchStartY = 0;

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            initAudio();
            
            if ((e.code === 'Space' || e.code === 'ArrowUp') && gameState === 'playing') {
                player.jumpBufferCounter = PHYSICS.jumpBuffer;
            }
            
            if (e.code === 'ArrowDown' && gameState === 'playing' && player.onGround) {
                performTrick();
            }
            
            if ((e.code === 'Space' || e.code === 'Enter') && gameState !== 'playing') {
                if (gameState === 'start' || gameState === 'gameOver') {
                    gameState = 'playing';
                    resetGame();
                } else if (gameState === 'levelComplete') {
                    level++;
                    if (level > 3) {
                        gameState = 'win';
                    } else {
                        gameState = 'playing';
                        resetGame();
                        playSound('levelup');
                    }
                } else if (gameState === 'win') {
                    gameState = 'start';
                }
            }
        });

        window.addEventListener('keyup', e => {
            keys[e.code] = false;
        });

        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            initAudio();
            touchStartY = e.touches[0].clientY;
            if (gameState !== 'playing') {
                if (gameState === 'start' || gameState === 'gameOver') {
                    gameState = 'playing';
                    resetGame();
                }
            } else {
                player.jumpBufferCounter = PHYSICS.jumpBuffer;
            }
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            const touchEndY = e.changedTouches[0].clientY;
            if (touchEndY - touchStartY > 30 && player.onGround) {
                performTrick();
            }
        });

        function performTrick() {
            if (!player.onGround || player.trickActive) return;
            
            player.trickActive = true;
            player.trickType = Math.floor(Math.random() * 4) + 1;
            player.trickTimer = 30;
            player.canDoubleJump = true;
            
            playSound('trick');
            createParticles(player.x, player.y + player.h/2, '#FFD700', 10);
        }

        function updatePhysics() {
            if (keys['ArrowRight'] || keys['KeyD']) {
                speed = Math.min(speed + PHYSICS.accel, PHYSICS.maxSpeed);
            } else if (keys['ArrowLeft'] || keys['KeyA']) {
                speed = Math.max(speed - PHYSICS.decel, 0);
            } else {
                speed *= PHYSICS.friction;
                if (Math.abs(speed) < 0.1) speed = 0;
            }
            
            player.x += speed * 0.5;
            
            if (player.onGround) {
                player.coyoteCounter = PHYSICS.coyoteTime;
            } else if (player.coyoteCounter > 0) {
                player.coyoteCounter--;
            }
            
            if (player.jumpBufferCounter > 0) {
                player.jumpBufferCounter--;
                
                if (player.coyoteCounter > 0) {
                    player.vy = PHYSICS.jumpForce;
                    player.onGround = false;
                    player.coyoteCounter = 0;
                    player.jumpBufferCounter = 0;
                    player.canDoubleJump = true;
                    playSound('jump');
                    createParticles(player.x, player.y + player.h/2, '#FFF', 5);
                } else if (player.canDoubleJump) {
                    player.vy = PHYSICS.doubleJumpForce;
                    player.canDoubleJump = false;
                    player.jumpBufferCounter = 0;
                    playSound('jump');
                    createParticles(player.x, player.y + player.h/2, '#FFD700', 8);
                }
            }
            
            player.vy += PHYSICS.gravity;
            player.y += player.vy;
            
            if (player.y >= GROUND_Y) {
                player.y = GROUND_Y;
                player.vy = 0;
                player.onGround = true;
                player.canDoubleJump = false;
                
                if (player.isWipedOut) {
                    player.isWipedOut = false;
                    player.recoverTimer = 30;
                }
            } else {
                player.onGround = false;
            }
            
            if (player.trickActive) {
                player.trickTimer--;
                if (player.trickTimer <= 0) {
                    player.trickActive = false;
                    player.trickType = 0;
                    
                    if (player.onGround) {
                        combo++;
                        tricksDone++;
                        const bonus = combo * 100;
                        score += bonus;
                        addTrickText(`${combo}x COMBO! +${bonus}`, player.x, player.y - 30, bonus);
                        playSound('collect');
                    }
                }
            }
            
            if (player.isWipedOut && player.recoverTimer > 0) {
                player.recoverTimer--;
                if (player.recoverTimer <= 0) {
                    player.isWipedOut = false;
                }
            }
            
            if (screenShake > 0) screenShake--;
        }

        function updateWorld() {
            scrollOffset += speed;
            distance += speed * 0.1;
            
            parallaxLayers.background.forEach(p => p.x -= speed * 0.2);
            parallaxLayers.midground.forEach(p => p.x -= speed * 0.5);
            parallaxLayers.foreground.forEach(p => p.x -= speed);
            
            [parallaxLayers.background, parallaxLayers.midground, parallaxLayers.foreground].forEach(layer => {
                layer.forEach(p => {
                    if (p.x + p.w < 0) {
                        p.x = W + Math.random() * 50;
                    }
                });
            });
            
            if (Math.random() < 0.02 && obstacles.length < 5) {
                const lastObs = obstacles[obstacles.length - 1];
                if (!lastObs || lastObs.x < W - 200) {
                    spawnObstacle();
                }
            }
            
            obstacles.forEach(obs => {
                obs.x -= speed;
                
                if (!obs.passed && !player.isWipedOut) {
                    const playerRect = {
                        x: player.x - player.w/2 + 10,
                        y: player.y - player.h + 10,
                        w: player.w - 20,
                        h: player.h - 20
                    };
                    const obsRect = {
                        x: obs.x,
                        y: obs.y - obs.h,
                        w: obs.w,
                        h: obs.h
                    };
                    
                    if (playerRect.x < obsRect.x + obsRect.w &&
                        playerRect.x + playerRect.w > obsRect.x &&
                        playerRect.y < obsRect.y + obsRect.h &&
                        playerRect.y + playerRect.h > obsRect.y) {
                        
                        if (player.trickActive && obs.type !== 'barrier') {
                            obs.passed = true;
                            combo++;
                            score += combo * 50;
                            addTrickText('STYLE! +50', player.x, player.y - 40, 50);
                            playSound('collect');
                        } else {
                            player.isWipedOut = true;
                            player.recoverTimer = 60;
                            screenShake = 10;
                            combo = 0;
                            playSound('crash');
                            createParticles(player.x, player.y, '#FF0000', 15);
                            
                            if (score > highScore) {
                                highScore = Math.floor(score);
                                localStorage.setItem('skateHigh', highScore);
                            }
                        }
                    }
                }
                
                if (!obs.passed && obs.x + obs.w < player.x - player.w/2) {
                    obs.passed = true;
                    score += 10;
                }
            });
            
            obstacles = obstacles.filter(obs => obs.x > -100);
            
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.3;
                p.life--;
            });
            particles = particles.filter(p => p.life > 0);
            
            trickTexts.forEach(t => {
                t.y += t.vy;
                t.life--;
            });
            trickTexts = trickTexts.filter(t => t.life > 0);
            
            const levelCfg = LEVEL_CONFIG[level] || LEVEL_CONFIG[3];
            if (distance >= levelCfg.targetDist) {
                gameState = 'levelComplete';
                playSound('levelup');
            }
            
            score += speed * 0.01;
        }

        function drawParallax() {
            const levelCfg = LEVEL_CONFIG[level] || LEVEL_CONFIG[1];
            const colors = levelCfg.bgColors;
            
            const gradient = ctx.createLinearGradient(0, 0, 0, H);
            gradient.addColorStop(0, colors[0]);
            gradient.addColorStop(1, colors[1]);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);
            
            ctx.fillStyle = colors[1];
            parallaxLayers.background.forEach(b => {
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.fillStyle = '#FFD700';
                for (let wy = b.y + 10; wy < b.y + b.h - 10; wy += 15) {
                    for (let wx = b.x + 5; wx < b.x + b.w - 5; wx += 12) {
                        if (Math.random() > 0.3) {
                            ctx.fillRect(wx, wy, 6, 8);
                        }
                    }
                }
                ctx.fillStyle = colors[1];
            });
            
            ctx.fillStyle = colors[2];
            parallaxLayers.midground.forEach(m => {
                ctx.fillRect(m.x, m.y, m.w, m.h);
            });
            
            ctx.fillStyle = '#2d2d2d';
            ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
            
            ctx.fillStyle = '#FFFF00';
            for (let i = 0; i < W; i += 80) {
                const x = (i - scrollOffset * 0.8) % W;
                if (x < 0) ctx.fillRect(W + x, GROUND_Y + 10, 40, 4);
                else ctx.fillRect(x, GROUND_Y + 10, 40, 4);
            }
            
            ctx.fillStyle = '#444';
            parallaxLayers.foreground.forEach(f => {
                ctx.fillRect(f.x, f.y, f.w, f.h);
            });
        }

        function draw() {
            ctx.save();
            
            if (screenShake > 0) {
                ctx.translate(
                    (Math.random() - 0.5) * screenShake,
                    (Math.random() - 0.5) * screenShake
                );
            }
            
            ctx.clearRect(0, 0, W, H);
            drawParallax();
            
            obstacles.forEach(obs => {
                switch(obs.type) {
                    case 'cone':
                        ctx.fillStyle = '#FF6600';
                        ctx.beginPath();
                        ctx.moveTo(obs.x, obs.y);
                        ctx.lineTo(obs.x + obs.w/2, obs.y - obs.h);
                        ctx.lineTo(obs.x + obs.w, obs.y);
                        ctx.fill();
                        break;
                    case 'barrier':
                        ctx.fillStyle = '#FF0000';
                        ctx.fillRect(obs.x, obs.y - obs.h, obs.w, obs.h);
                        ctx.fillStyle = '#FFFFFF';
                        ctx.fillRect(obs.x, obs.y - obs.h + 10, obs.w, 8);
                        ctx.fillRect(obs.x, obs.y - obs.h + 26, obs.w, 8);
                        break;
                    case 'ramp':
                        ctx.fillStyle = '#8B4513';
                        ctx.beginPath();
                        ctx.moveTo(obs.x, obs.y);
                        ctx.lineTo(obs.x + obs.w, obs.y);
                        ctx.lineTo(obs.x + obs.w, obs.y - obs.h);
                        ctx.fill();
                        break;
                    case 'rail':
                        ctx.fillStyle = '#C0C0C0';
                        ctx.fillRect(obs.x, obs.y - 20, obs.w, 6);
                        ctx.fillStyle = '#808080';
                        ctx.fillRect(obs.x + 5, obs.y - 14, 4, 14);
                        ctx.fillRect(obs.x + obs.w - 9, obs.y - 14, 4, 14);
                        break;
                }
            });
            
            particles.forEach(p => {
                ctx.globalAlpha = p.life / 50;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            ctx.globalAlpha = 1;
            
            determineAnimation();
            updateAnimation();
            drawSprite(player.x, player.y);
            
            trickTexts.forEach(t => {
                ctx.globalAlpha = t.life / 60;
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 20px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText(t.text, t.x, t.y);
                ctx.font = '14px Courier New';
                ctx.fillText(`+${t.bonus}`, t.x, t.y + 18);
            });
            ctx.globalAlpha = 1;
            
            ctx.restore();
            
            drawUI();
        }

        function drawUI() {
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 24px Courier New';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${Math.floor(score)}`, 20, 35);
            ctx.font = '16px Courier New';
            ctx.fillText(`HIGH: ${highScore}`, 20, 55);
            
            const levelCfg = LEVEL_CONFIG[level] || LEVEL_CONFIG[3];
            ctx.textAlign = 'center';
            ctx.fillText(`${levelCfg.label}`, W/2, 30);
            ctx.font = '14px Courier New';
            const progress = Math.min(100, Math.floor((distance / levelCfg.targetDist) * 100));
            ctx.fillText(`Progress: ${progress}%`, W/2, 50);
            
            if (combo > 1) {
                ctx.fillStyle = '#FF6600';
                ctx.font = 'bold 28px Courier New';
                ctx.textAlign = 'right';
                ctx.fillText(`${combo}x COMBO!`, W - 20, 35);
            }
            
            ctx.fillStyle = '#AAAAAA';
            ctx.font = '12px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('SPACE/TAP: Jump | DOWN/SWIPE: Trick | Arrow Keys: Speed', W/2, H - 10);
        }

        function drawStartScreen() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, W, H);
            
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 48px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('THIRD COAST SHREAD', W/2, H/2 - 80);
            
            ctx.fillStyle = '#FFFFFF';
            ctx.font = '24px Courier New';
            ctx.fillText('An awesome skateboarding adventure!', W/2, H/2 - 40);
            
            ctx.fillStyle = '#AAAAAA';
            ctx.font = '18px Courier New';
            ctx.fillText('Press SPACE or TAP to start', W/2, H/2 + 20);
            
            ctx.font = '16px Courier New';
            ctx.fillText('SPACE/TAP: Jump | DOWN: Trick | Arrows: Speed', W/2, H/2 + 60);
            ctx.fillText('Perform tricks over obstacles for bonus points!', W/2, H/2 + 90);
        }

        function drawLevelComplete() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, W, H);
            
            const levelCfg = LEVEL_CONFIG[level] || LEVEL_CONFIG[3];
            
            ctx.fillStyle = '#00FF00';
            ctx.font = 'bold 42px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('LEVEL COMPLETE!', W/2, H/2 - 40);
            
            ctx.fillStyle = '#FFFFFF';
            ctx.font = '24px Courier New';
            ctx.fillText(`${levelCfg.label} Cleared!`, W/2, H/2 + 10);
            ctx.fillText(`Score: ${Math.floor(score)}`, W/2, H/2 + 50);
            
            ctx.fillStyle = '#FFD700';
            ctx.font = '18px Courier New';
            ctx.fillText('Press SPACE to continue', W/2, H/2 + 100);
        }

        function drawWinScreen() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, W, H);
            
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 48px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('YOU WIN!', W/2, H/2 - 60);
            
            ctx.fillStyle = '#FFFFFF';
            ctx.font = '24px Courier New';
            ctx.fillText('Final Score: ' + Math.floor(score), W/2, H/2);
            ctx.fillText('Tricks Performed: ' + tricksDone, W/2, H/2 + 40);
            
            ctx.fillStyle = '#AAAAAA';
            ctx.font = '18px Courier New';
            ctx.fillText('Press SPACE to play again', W/2, H/2 + 90);
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, W, H);
            
            ctx.fillStyle = '#FF4444';
            ctx.font = 'bold 48px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('WIPEOUT!', W/2, H/2 - 40);
            
            ctx.fillStyle = '#FFFFFF';
            ctx.font = '24px Courier New';
            ctx.fillText('Score: ' + Math.floor(score), W/2, H/2 + 10);
            
            ctx.fillStyle = '#FFD700';
            ctx.font = '18px Courier New';
            ctx.fillText('Press SPACE to retry', W/2, H/2 + 60);
        }

        function gameLoop() {
            if (gameState === 'playing') {
                updatePhysics();
                updateWorld();
            }
            
            draw();
            
            if (gameState === 'start') drawStartScreen();
            else if (gameState === 'levelComplete') drawLevelComplete();
            else if (gameState === 'win') drawWinScreen();
            else if (gameState === 'gameOver') drawGameOver();
            
            requestAnimationFrame(gameLoop);
        }

        loadSprite();
        initParallaxLayers();
        gameLoop();

    })();
    </script>
</body>
</html>
